{% extends "base.html" %}

{% block title %}sendword - Change Password{% endblock %}

{% block content %}
<main class="max-w-lg mx-auto px-4 py-8">
  <div class="mb-6">
    <a href="/settings/users" class="sw-back">&larr; Back to users</a>
  </div>

  <h1 class="text-2xl font-bold mb-6">Change Password</h1>

  {% if success %}
  <div class="sw-alert sw-alert-success">{{ success }}</div>
  {% endif %}

  {% if error %}
  <div class="sw-alert sw-alert-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/settings/password" class="space-y-4">
    <input type="hidden" name="username_hint" value="{{ username }}" autocomplete="username">
    <div>
      <label for="current_password" class="sw-label">Current password</label>
      <input type="password" id="current_password" name="current_password" required autocomplete="current-password" class="sw-input">
    </div>
    <div>
      <label for="new_password" class="sw-label">New password</label>
      <input type="password" id="new_password" name="new_password" required autocomplete="new-password" class="sw-input">
    </div>
    <div>
      <label for="confirm_password" class="sw-label">Confirm new password</label>
      <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password" class="sw-input">
    </div>
    <button type="submit" class="sw-btn sw-btn-primary w-full justify-center">Update password</button>
  </form>
</main>
{% endblock %}
