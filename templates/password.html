{% extends "base.html" %}

{% block title %}sendword - Change Password{% endblock %}

{% block content %}
<main class="max-w-lg mx-auto px-4 py-8">
  <div class="mb-6">
    <a href="/settings/users" class="text-sm text-gray-500 hover:text-gray-700">&larr; Back to users</a>
  </div>

  <h1 class="text-2xl font-bold mb-6">Change password</h1>

  {% if success %}
  <div class="bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg p-3 mb-4">
    {{ success }}
  </div>
  {% endif %}

  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3 mb-4">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/settings/password" class="space-y-4">
    <input type="hidden" name="username_hint" value="{{ username }}" autocomplete="username">
    <div>
      <label for="current_password" class="block text-sm font-medium text-gray-700 mb-1">Current password</label>
      <input
        type="password"
        id="current_password"
        name="current_password"
        required
        autocomplete="current-password"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      >
    </div>
    <div>
      <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">New password</label>
      <input
        type="password"
        id="new_password"
        name="new_password"
        required
        autocomplete="new-password"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      >
    </div>
    <div>
      <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm new password</label>
      <input
        type="password"
        id="confirm_password"
        name="confirm_password"
        required
        autocomplete="new-password"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      >
    </div>
    <button
      type="submit"
      class="w-full bg-blue-600 text-white text-sm font-medium rounded-lg px-4 py-2 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
    >
      Update password
    </button>
  </form>
</main>
{% endblock %}
