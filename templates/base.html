<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}sendword{% endblock %}</title>
    <link rel="stylesheet" href="/static/dist/app.css">
    <script src="https://unpkg.com/htmx.org@2" defer></script>
</head>
<body>
    {% block nav %}
    {% if username is defined and username %}
    <nav class="border-b bg-white">
      <div class="max-w-4xl mx-auto px-4 flex items-center justify-between h-12">
        <div class="flex items-center gap-6">
          <a href="/" class="text-sm font-bold text-gray-900">sendword</a>
          <div class="flex items-center gap-4 text-sm">
            <a href="/" class="{{ 'text-blue-600 font-medium' if nav_active == 'dashboard' else 'text-gray-500 hover:text-gray-700' }}">Dashboard</a>
            <a href="/scripts" class="{{ 'text-blue-600 font-medium' if nav_active == 'scripts' else 'text-gray-500 hover:text-gray-700' }}">Scripts</a>
            <a href="/settings/users" class="{{ 'text-blue-600 font-medium' if nav_active == 'settings' else 'text-gray-500 hover:text-gray-700' }}">Settings</a>
          </div>
        </div>
        <div class="flex items-center gap-4 text-sm">
          <span class="text-gray-500">{{ username }}</span>
          <a href="/logout" class="text-gray-500 hover:text-gray-700">Logout</a>
        </div>
      </div>
    </nav>
    {% endif %}
    {% endblock %}
    {% block content %}{% endblock %}
    <script type="module" src="/static/dist/main.js"></script>
</body>
</html>
