<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0c0a09"/>

  <!-- Diagonal "sendword" text — large, faded, background texture -->
  <text
    x="600" y="380"
    font-family="DejaVu Sans Mono"
    font-weight="900"
    font-size="180"
    fill="#ffffff"
    fill-opacity="0.06"
    text-anchor="middle"
    transform="rotate(-15, 600, 315)"
    letter-spacing="12"
  >sendword</text>

  <!-- Icon — centered envelope -->
  <g transform="translate(504, 195) scale(6)">
    <rect x="2" y="6" width="28" height="20" rx="3" fill="#0c0a09" stroke="#ffffff" stroke-width="2"/>
    <path d="M2 8l14 10 14-10" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="26" cy="8" r="5" fill="#e06c75"/>
  </g>

  <!-- "sendword" label below icon -->
  <text
    x="600" y="500"
    font-family="DejaVu Sans Mono"
    font-weight="800"
    font-size="48"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="6"
  >SENDWORD</text>

  <!-- Tagline -->
  <text
    x="600" y="545"
    font-family="DejaVu Sans Mono"
    font-weight="400"
    font-size="20"
    fill="#a1a1aa"
    text-anchor="middle"
    letter-spacing="3"
  >WEBHOOKS THAT RUN COMMANDS</text>
</svg>
