- title: Auth, not afterthought
  description: Bearer tokens, HMAC-SHA256, or open access. Secrets reference env vars. Constant-time comparison prevents timing attacks.

- title: Reject before execute
  description: JSON schema per hook. Malformed payloads are rejected before your command runs.

- title: Control what fires
  description: Filter by payload fields, restrict to time windows, enforce cooldowns, apply rate limits — all before execution.

- title: Shell, script, or HTTP
  description: Run commands with payload interpolation, execute managed scripts, or forward to endpoints. Per-hook timeouts and working directories.

- title: Retries that back off
  description: None, linear, or exponential. Configurable per hook or globally, with max delay caps.

- title: Concurrency without plumbing
  description: Mutex or queue-based execution prevents conflicts. Approval workflows gate deployments behind human review.

- title: Secrets stay out of logs
  description: Mask env var values and regex patterns in output. Sensitive data never reaches the dashboard or log files.

- title: Snapshot, restore, done
  description: Back up database and config to S3-compatible storage on a schedule. Restore with one command. Retention handles cleanup.
