- title: Webhook Authentication
  description: Bearer tokens, HMAC-SHA256 signature verification, or open access. Secrets can reference environment variables. Constant-time comparison prevents timing attacks.

- title: Payload Validation
  description: Define a JSON schema per hook. Sendword validates every incoming request and rejects malformed payloads before your command ever runs.

- title: Trigger Rules
  description: Filter by payload fields (equals, regex, contains), restrict to time windows, enforce cooldowns, and apply rate limits — all before execution begins.

- title: Three Executors
  description: Run shell commands with payload interpolation, execute managed scripts, or forward to HTTP endpoints. Each hook picks one, with per-hook timeout and working directory.

- title: Retries & Backoff
  description: Automatic retries on failure with none, linear, or exponential backoff strategies. Configurable per hook or globally, with max delay caps.

- title: Barriers & Approval
  description: Mutex or queue-based concurrency control prevents resource exhaustion. Optional approval workflows let you gate production deployments behind a human review.

- title: Log Masking
  description: Mask environment variable values and regex patterns in execution logs. Sensitive data never appears in the web UI or log files.

- title: Backup & Restore
  description: Snapshot your database and config to S3-compatible storage on a cron schedule. Restore with a single command. Retention policies keep storage tidy.
