# sendword configuration
# Env vars override all settings. Use SENDWORD_<SECTION>__<KEY> format.
# Example: SENDWORD_SERVER__PORT=9090

[server]
bind = "127.0.0.1"
port = 8080

[database]
path = "data/sendword.db"

[logs]
dir = "data/logs"

[auth]
session_lifetime = "24h"
secure_cookie = false

[scripts]
dir = "data/scripts"

[defaults]
timeout = "30s"

[defaults.rate_limit]
max_per_minute = 60

[defaults.retries]
count = 0
backoff = "exponential"
initial_delay = "1s"
max_delay = "60s"

